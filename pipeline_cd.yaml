
 parameters: # if parameter not defined we ll see issue
  - name: steps # got an issue when no hyphen in the name
    displayName: 'Steps to add'
    type: stepList
    default: [] 
 
 jobs:
  - job: Deploy
    displayName: 'Terraform Plan'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
          - ${{each step in parameters.steps}}: #useful to add steps in the future without changing the template
            -  ${{each pair in step}}: 
                   ${{pair.key}}:${{pair.value}}
          - task: azurekeyvault@2
            displayName: 'Azure Key Vault: Fetch secrets'
            inputs:
              connectedServiceName: 'AzureDevOpsConnectionToAzure' ##azdo-ariyans-learning#this svc name should be there in azdo or it ll throw error
              keyVaultName: 'ariyans' # the svc above should have the permission to view the secret
          - script: env | grep ARM
            displayName: "Debug ARM"
            env:
                ARM_CLIENT_ID: $(ClientID)
                ARM_TENANT_ID: $(TenantID)
                ARM_CLIENT_SECRET: $(ClientSecret)
            # we are adding above step to view the env variable we got in keyvault task

          - task: terraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest' # we are installing as the public azdo doesnt have it
          - script: |
              make init
              make plan
          #terraform will expect the env variables in below format , if some other name it wont work
            env:
                ARM_CLIENT_ID: $(ClientID)
                ARM_TENANT_ID: $(TenantID)
                ARM_CLIENT_SECRET: $(ClientSecret)
                #https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs/guides/service_principal_client_secret

        #now left side what we see is  the environment variable we are using in the script and right side is the pipeline variable we got from keyvault task and we are passing it to the script as env variable so that terraform can use it to authenticate with azure and do the plan
            displayName: 'Terraform Plan and Env Variable'

